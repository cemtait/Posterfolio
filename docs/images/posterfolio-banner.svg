<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17191c"/>
      <stop offset="100%" stop-color="#24282d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fb9d8"/>
      <stop offset="100%" stop-color="#5f8fb3"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1400" height="360" rx="28" fill="url(#bg)"/>

  <g opacity="0.18">
    <rect x="920" y="42" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="1028" y="42" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="1136" y="42" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="1244" y="42" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="920" y="190" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="1028" y="190" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="1136" y="190" width="88" height="126" rx="4" fill="#ffffff"/>
    <rect x="1244" y="190" width="88" height="126" rx="4" fill="#ffffff"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="62" width="220" height="236" rx="34" fill="#111315" stroke="#3d444b" stroke-width="3"/>
